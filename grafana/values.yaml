# -------------------------------------------------------
# Grafana – values.yaml
# Konfiguriert für interne Registry + kind + LoadBalancer
# -------------------------------------------------------

# -------------------------------------------------------
# Globale Registry – überschreibt ALLE Images auf einmal
# -------------------------------------------------------
global:
  imageRegistry: registry.intern.example.com
  imagePullSecrets:
    - name: internal-registry-secret

# Zusätzlich auf Pod-Ebene (Fallback / Redundanz)
imagePullSecrets:
  - name: internal-registry-secret

replicas: 1

# -------------------------------------------------------
# Hauptimage – Grafana
# -------------------------------------------------------
image:
  registry: registry.intern.example.com      # <-- Interne Registry
  repository: grafana/grafana
  tag: "12.0.0"                               # Fester Tag (intern gespiegelt)
  sha: ""
  pullPolicy: IfNotPresent
  pullSecrets:
    - internal-registry-secret

# -------------------------------------------------------
# Init-Container (Daten-Ownership)
# -------------------------------------------------------
initChownData:
  enabled: true
  image:
    registry: registry.intern.example.com    # <-- Interne Registry
    repository: library/busybox
    tag: "1.31.1"
    sha: ""
    pullPolicy: IfNotPresent

# -------------------------------------------------------
# Download-Dashboards (curl-Image)
# -------------------------------------------------------
downloadDashboardsImage:
  registry: registry.intern.example.com      # <-- Interne Registry
  repository: curlimages/curl
  tag: "8.9.1"
  sha: ""
  pullPolicy: IfNotPresent

# -------------------------------------------------------
# Sidecar (k8s-sidecar für dynamische Dashboards/Datasources)
# -------------------------------------------------------
sidecar:
  image:
    registry: registry.intern.example.com    # <-- Interne Registry
    repository: kiwigrid/k8s-sidecar
    tag: "1.30.3"
    sha: ""
    imagePullPolicy: IfNotPresent
  dashboards:
    enabled: false
  datasources:
    enabled: false
  alerts:
    enabled: false
  plugins:
    enabled: false

# -------------------------------------------------------
# Test-Framework (kann in Prod deaktiviert werden)
# -------------------------------------------------------
testFramework:
  enabled: false
  image:
    registry: registry.intern.example.com    # <-- Interne Registry
    repository: bats/bats
    tag: "v1.4.1"
    imagePullPolicy: IfNotPresent

# -------------------------------------------------------
# Service – LoadBalancer für kind
# -------------------------------------------------------
service:
  enabled: true
  type: LoadBalancer
  port: 80
  targetPort: 3000
  annotations: {}
  labels: {}

# -------------------------------------------------------
# Ingress – deaktiviert (LoadBalancer reicht)
# -------------------------------------------------------
ingress:
  enabled: false

# -------------------------------------------------------
# Admin-Zugangsdaten
# -------------------------------------------------------
adminUser: admin
adminPassword: "changeme123!"   # <-- Bitte ändern!

# -------------------------------------------------------
# Grafana-Konfiguration (grafana.ini)
# -------------------------------------------------------
grafana.ini:
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning
  analytics:
    check_for_updates: false    # kein Internet in isolierter Umgebung
  log:
    mode: console
  server:
    domain: ""
  grafana_net:
    url: https://grafana.net

# -------------------------------------------------------
# Datasource – Prometheus vorkonfigurieren
# -------------------------------------------------------
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        access: proxy
        isDefault: true

# -------------------------------------------------------
# Persistenz (für kind: deaktiviert, da kein PV nötig)
# -------------------------------------------------------
persistence:
  type: pvc
  enabled: false

# -------------------------------------------------------
# RBAC / ServiceAccount
# -------------------------------------------------------
rbac:
  create: true
  pspEnabled: false
  namespaced: false

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

# -------------------------------------------------------
# Ressourcen
# -------------------------------------------------------
resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# -------------------------------------------------------
# Sicherheit
# -------------------------------------------------------
securityContext:
  runAsNonRoot: true
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# -------------------------------------------------------
# Node-Selektor / Tolerations / Affinität
# -------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}