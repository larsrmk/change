
loglevel: info

imagePullSecrets:
  - name: internal-registry-secret

opencost:
  exporter:
    replicas: 1

    image:
      registry: 
      repository: opencost/opencost
      tag: "1.113.0"                         
      pullPolicy: IfNotPresent

    apiPort: 9003

    defaultClusterId: "kind-local"

    resources:
      requests:
        cpu: "10m"
        memory: "55Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

    env:
      - name: PROMETHEUS_SERVER_ENDPOINT
        value: "http://prometheus-server.monitoring.svc.cluster.local:80"
      - name: CLUSTER_ID
        value: "kind-local"
      - name: CLOUD_PROVIDER_API_KEY
        value: ""

    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
    readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  customPricing:
    enabled: true
    provider: custom
    description: "Local kind cluster pricing"
    CPU: "0.031611"
    spotCPU: "0.006655"
    RAM: "0.004237"
    spotRAM: "0.000892"
    GPU: "0.95"
    storage: "0.00005479452"
    zoneNetworkEgress: "0.01"
    regionNetworkEgress: "0.01"
    internetNetworkEgress: "0.12"
    configPath: "/tmp/custom-pricing"

  service:
    type: LoadBalancer
    port: 9003
    targetPort: 9003
    labels: {}
    annotations: {}

  ui:
    enabled: true

    image:
      registry: 
      repository: opencost/opencost-ui
      tag: "1.113.0"                           
      pullPolicy: IfNotPresent

    uiPort: 9090

    resources:
      requests:
        cpu: "10m"
        memory: "55Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

    service:
      type: LoadBalancer
      port: 9090
      targetPort: 9090
      labels: {}
      annotations: {}

    ingress:
      enabled: false

  prometheus:
    internal:
      enabled: false
    external:
      enabled: true
      url: "http://prometheus-server.monitoring.svc.cluster.local:80"

  serviceAccount:
    create: true
    annotations: {}
    name: "opencost"

  rbac:
    enabled: true

nodeSelector: {}
tolerations: []
affinity: {}

plugins:
  enabled: false